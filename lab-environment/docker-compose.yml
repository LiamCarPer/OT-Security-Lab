version: '3.8'

services:
  # 1. The "Firewall" / Router / Gateway
  gateway:
    image: alpine:latest
    container_name: ot_gateway
    command: /bin/sh -c "apk add --no-cache iptables && sysctl -w net.ipv4.ip_forward=1 && tail -f /dev/null"
    privileged: true
    networks:
      - it_network
      - ops_network
      - supervisory_network
      - control_network

  # 2. Intake Process PLC (Level 1 - Control)
  # Updated to the NEW official GHCR repository (OpenPLC v4)
  plc_intake:
    image: ghcr.io/autonomy-logic/openplc-runtime:latest
    container_name: plc_intake
    cap_add:
      - SYS_NICE
      - SYS_RESOURCE
    networks:
      - control_network

  # 3. Human Machine Interface (Level 2 - Supervisory)
  # Scada-LTS (Modern ScadaBR)
  hmi:
    image: scadalts/scadalts:latest
    container_name: ot_hmi
    networks:
      - supervisory_network
      - control_network

  # 4. Process Historian (Level 3 - Operations)
  historian:
    image: influxdb:1.8
    container_name: ot_historian
    environment:
      - INFLUXDB_DB=ot_data
    networks:
      - ops_network

  # 5. Attacker (Level 4/5 - Enterprise/Internet)
  attacker:
    image: kalilinux/kali-rolling
    container_name: ot_attacker
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
    networks:
      - it_network

networks:
  it_network:
    driver: bridge
  ops_network:
    internal: true
  supervisory_network:
    internal: true
  control_network:
    internal: true
