
services:
  # 1. The "Firewall" / Router / Gateway
  gateway:
    image: alpine:latest
    container_name: ot_gateway
    command: /bin/sh -c "apk add --no-cache iptables python3 py3-pip libpcap && pip3 install scapy --break-system-packages && sysctl -w net.ipv4.ip_forward=1 && tail -f /dev/null"
    privileged: true
    volumes:
      - ../detection/rules:/detection/rules
      - ../detection/logs:/detection/logs
      - ./network-config:/network-config
    networks:
      it_network:
        ipv4_address: 172.24.0.2
      ops_network:
        ipv4_address: 172.23.0.2
      supervisory_network:
        ipv4_address: 172.22.0.2
      control_network:
        ipv4_address: 172.21.0.2

  # 2. Intake Process PLC (Level 1 - Control)
  plc_intake:
    image: ghcr.io/autonomy-logic/openplc-runtime:latest
    container_name: plc_intake
    ports:
      - "8443:8443"
    cap_add:
      - SYS_NICE
      - SYS_RESOURCE
    networks:
      control_network:
        ipv4_address: 172.21.0.10

  # 3. Treatment Process PLC (Level 1 - Control)
  plc_treatment:
    image: ghcr.io/autonomy-logic/openplc-runtime:latest
    container_name: plc_treatment
    ports:
      - "8444:8443"
    cap_add:
      - SYS_NICE
      - SYS_RESOURCE
    networks:
      control_network:
        ipv4_address: 172.21.0.11

  # 4. Distribution Process PLC (Level 1 - Control)
  plc_distribution:
    image: ghcr.io/autonomy-logic/openplc-runtime:latest
    container_name: plc_distribution
    ports:
      - "8445:8443"
    cap_add:
      - SYS_NICE
      - SYS_RESOURCE
    networks:
      control_network:
        ipv4_address: 172.21.0.12

  # 5. Human Machine Interface (Level 2 - Supervisory)
  hmi:
    image: scadalts/scadalts:latest
    container_name: ot_hmi
    ports:
      - "8080:8080"
    networks:
      supervisory_network:
        ipv4_address: 172.22.0.10
      control_network:
        ipv4_address: 172.21.0.20

  # 6. Process Historian (Level 3 - Operations)
  historian:
    image: influxdb:1.8
    container_name: ot_historian
    environment:
      - INFLUXDB_DB=ot_data
    networks:
      ops_network:
        ipv4_address: 172.23.0.10

  # 7. Attacker (Level 4/5 - Enterprise/Internet)
  attacker:
    image: kalilinux/kali-rolling
    container_name: ot_attacker
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
    # Automatically install dependencies and add the pivot route on startup
    command: >
      /bin/sh -c "apt-get update && apt-get install -y python3 python3-pip iputils-ping iproute2 nmap && 
      pip3 install scapy --break-system-packages && 
      ip route add 172.21.0.0/24 via 172.24.0.2 && 
      ip route add 172.22.0.0/24 via 172.24.0.2 && 
      ip route add 172.23.0.0/24 via 172.24.0.2 && 
      tail -f /dev/null"
    volumes:
      - ./attacker:/attacker
    networks:
      it_network:
        ipv4_address: 172.24.0.10

  # --- SIEM STACK (Level 3 & Level 4 Integration) ---

  # 8. Log Storage (Loki) - Level 4 Enterprise
  loki:
    image: grafana/loki:latest
    container_name: ot_loki
    volumes:
      - ../siem/configs/loki-config.yaml:/etc/loki/local-config.yaml
    networks:
      it_network:
        ipv4_address: 172.24.0.20

  # 9. Log Collector (Promtail) - Level 4 Enterprise
  promtail:
    image: grafana/promtail:latest
    container_name: ot_promtail
    volumes:
      - ../siem/configs/promtail-config.yaml:/etc/promtail/config.yml
      - ../detection/logs:/logs
    networks:
      it_network:
        ipv4_address: 172.24.0.21

  # 10. Visualization (Grafana) - Level 4 Enterprise
  grafana:
    image: grafana/grafana:latest
    container_name: ot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ../siem/configs/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ../siem/configs/grafana-dashboards-provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml
      - ../siem/dashboards:/var/lib/grafana/dashboards
    networks:
      it_network:
        ipv4_address: 172.24.0.22

networks:
  it_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/24
  ops_network:
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/24
  supervisory_network:
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24
  control_network:
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24
