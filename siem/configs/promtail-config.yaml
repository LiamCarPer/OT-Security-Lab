server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: ot_security_alerts
  static_configs:
  - targets:
      - localhost
    labels:
      job: ot_alerts
      __path__: /logs/*.json
  pipeline_stages:
  - json:
      expressions:
        timestamp: timestamp
        alert_type: alert_type
        source_ip: source_ip
        mitre_id: mitre_id
        description: description
  - timestamp:
      source: timestamp
      format: RFC3339
- job_name: endpoint_edr_logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: sysmon_edr
      env: ot_lab
      __path__: /var/log/ot-lab/edr_sysmon_sample.json

